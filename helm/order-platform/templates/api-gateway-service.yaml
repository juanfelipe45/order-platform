apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: {{ .Values.services.apiGateway.port }}
      targetPort: {{ .Values.services.apiGateway.targetPort }}
      nodePort: {{ .Values.services.apiGateway.nodePort }}
  type: {{ .Values.services.apiGateway.type }}