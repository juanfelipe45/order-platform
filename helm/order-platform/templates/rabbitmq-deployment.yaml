apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: {{ .Values.images.rabbitmq }}
          ports:
            - containerPort: {{ .Values.services.rabbitmq.amqpPort }}
            - containerPort: {{ .Values.services.rabbitmq.managementPort }}